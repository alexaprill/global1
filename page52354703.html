function dbmModuleProgress() {
    if (window.location.href.includes('courses/')) {
        const settings = {
            circle: { activeColor: "#3f66c2", bgColor: "#e0e0e0" },
            collapsible: { enabled: true, defaultState: false }
        };
        const separator = "/";

        function createOrUpdateBars(moduleEl) {
             try {
                 moduleEl.querySelector('.module-progress-circle-wrapper')?.remove();
                 const allLessons = moduleEl.querySelectorAll('.tlk-lectures__course-card');
                 if (!allLessons.length) return;
                
                 const completedLessons = moduleEl.querySelectorAll('.tlk-lectures__course-card .tlk-lectures__tick-wrap');
                 const totalCount = allLessons.length;
                 const completedCount = completedLessons.length;
                 const percent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
                 const angle = percent * 3.6;

                 const progressContainer = document.createElement('div');
                 progressContainer.className = 'module-progress-circle-wrapper';
                 progressContainer.innerHTML = `<div class="module-progress-circle"><span class="module-progress-circle-text"><span class="completed-lessons-count">${completedCount}</span>${separator}<span class="total-lessons-count">${totalCount}</span></span></div>`;
                
                 const circleEl = progressContainer.querySelector('.module-progress-circle');
                 circleEl.style.background = `conic-gradient(${settings.circle.activeColor} ${angle}deg, ${settings.circle.bgColor} ${angle}deg)`;

                 const headEl = moduleEl.querySelector('.dbm-head-module');
                 if (headEl) {
                     headEl.insertBefore(progressContainer, headEl.querySelector('.dbm-module-collapse-toggle'));
                 }
             } catch (e) { console.error('DBM Create/Update Bars Error:', e); }
        }

        function wrapHeaders(moduleEl) {
            try {
                if (moduleEl.querySelector('.dbm-head-module')) return;
                
                const titleEl = moduleEl.querySelector('.tlk-lectures__partition-title');
                const lessonsWrap = moduleEl.querySelector('.tlk-lectures__partition-wrap');
                if (!titleEl || !lessonsWrap) return;

                const headEl = document.createElement('div');
                headEl.className = 'dbm-head-module';
                const titleWrapper = document.createElement('div');
                titleWrapper.className = 'dbm-module-title';
                const indicator = document.createElement('div');
                indicator.className = 'dbm-indicator-module';
                
                moduleEl.insertBefore(headEl, lessonsWrap);
                titleWrapper.appendChild(indicator);
                titleWrapper.appendChild(titleEl);
                headEl.appendChild(titleWrapper);

                if (settings.collapsible.enabled) {
                    const collapseToggle = document.createElement('div');
                    collapseToggle.className = 'dbm-module-collapse-toggle';
                    headEl.appendChild(collapseToggle);
                    headEl.addEventListener('click', (e) => {
                        if (!e.target.closest('a')) moduleEl.classList.toggle('is-collapsed');
                    });
                    if (settings.collapsible.defaultState) {
                        moduleEl.classList.add('is-collapsed');
                    }
                }
            } catch (e) { console.error('DBM Wrap Headers Error:', e); }
        }

        function checkCompletion(moduleEl) {
            const head = moduleEl.querySelector('.dbm-head-module');
            if (!head) return;
            const completedCount = moduleEl.querySelectorAll('.tlk-lectures__course-card .tlk-lectures__tick-wrap').length;
            const totalCount = moduleEl.querySelectorAll('.tlk-lectures__course-card').length;
            const indicator = head.querySelector('.dbm-indicator-module');
            if (indicator) {
                indicator.classList.toggle('checked', completedCount === totalCount && totalCount > 0);
            }
        }

        const observer = new MutationObserver((mutations) => {
            for(const mutation of mutations) {
                if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                     document.querySelectorAll('.tlk-lectures__partition-item:not(.dbm-processed)').forEach(moduleEl => {
                         wrapHeaders(moduleEl);
                         createOrUpdateBars(moduleEl);
                         checkCompletion(moduleEl);
                         moduleEl.classList.add('dbm-processed');
                    });
                } else if (mutation.type === 'attributes' && mutation.target.classList.contains('tlk-lectures__tick-wrap')) {
                     const moduleEl = mutation.target.closest('.tlk-lectures__partition-item');
                     if (moduleEl) {
                         createOrUpdateBars(moduleEl);
                         checkCompletion(moduleEl);
                     }
                }
            }
        });

        function init() {
            const targetNode = document.querySelector('.tlk-lectures__list, .tlk-lectures__sections');
            if (targetNode) {
                 document.querySelectorAll('.tlk-lectures__partition-item').forEach(moduleEl => {
                     wrapHeaders(moduleEl);
                     createOrUpdateBars(moduleEl);
                     checkCompletion(moduleEl);
                     moduleEl.classList.add('dbm-processed');
                });
                observer.observe(targetNode, { childList: true, subtree: true, attributes: true });
            } else { setTimeout(init, 300); }
        }
        
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    }
}
dbmModuleProgress();
